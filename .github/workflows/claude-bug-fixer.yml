name: Claude Bug Fixer

on:
  issues:
    types: [opened, labeled]

jobs:
  fix-bug:
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'bug') ||
      (github.event.action == 'opened' && contains(toJSON(github.event.issue.labels), '"name":"bug"'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          fetch-depth: 1

      - name: Run Claude Bug Fixer
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            A issue #${{ github.event.issue.number }} foi marcada como bug.

            Título: ${{ github.event.issue.title }}

            Sua tarefa:
            1. Analise a issue para entender o bug relatado
            2. Localize o código relevante no repositório
            3. Diagnostique a causa raiz do problema
            4. Implemente a correção mais segura e mínima possível
            5. Crie um Pull Request com:
               - Título: `fix: [descrição curta do bug]`
               - Corpo com "Closes #${{ github.event.issue.number }}"
               - Explicação da causa raiz e solução adotada

            Diretrizes:
            - Faça apenas as mudanças necessárias para corrigir o bug — sem refatorações extras
            - Mantenha consistência com o estilo de código existente
            - Se o bug não for reproduzível ou a causa não for clara, comente na issue pedindo mais informações
          claude_args: '--max-turns 50 --allowedTools "Bash,Read,Edit,Write,Glob,Grep,LS"'
