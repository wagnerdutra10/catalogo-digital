name: Claude Bug Fixer

on:
  issues:
    types: [labeled]

jobs:
  fix-bug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Bug Fixer
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          label_trigger: bug
          prompt: |
            Você foi acionado porque esta issue foi marcada como bug.

            Contexto do projeto:
            - Leia AGENTS.md e docs/ARCHITECTURE.md antes de explorar o código
            - Frontend: Next.js App Router em app/, actions em app/actions/, componentes do painel em app/painel/
            - Stack: TypeScript, Supabase, Tailwind, shadcn/ui

            Sua tarefa:
            1. Leia AGENTS.md para entender o projeto
            2. Encontre o código relacionado ao bug descrito na issue
            3. Implemente a correção mínima necessária

            O PR deve ter:
            - Título: fix: <descrição curta do bug>
            - Corpo com "Closes #<número da issue>" e explicação da causa raiz

            Diretrizes:
            - Faça apenas as mudanças necessárias para corrigir o bug — sem refatorações extras
            - Mantenha consistência com o estilo de código existente
            - Se o bug não for reproduzível ou a causa não for clara, comente na issue pedindo mais informações
          claude_args: '--max-turns 50'
