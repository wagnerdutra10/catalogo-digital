name: Claude Bug Fixer

on:
  issues:
    types: [opened, labeled]

jobs:
  fix-bug:
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'bug') ||
      (github.event.action == 'opened' && contains(toJSON(github.event.issue.labels), '"name":"bug"'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "claude-bot@users.noreply.github.com"
          git config --global user.name "Claude Bot"

      - name: Run Claude Bug Fixer
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            A issue #${{ github.event.issue.number }} foi marcada como bug.

            Título: ${{ github.event.issue.title }}
            Descrição: ${{ github.event.issue.body }}

            Contexto do projeto:
            - Leia AGENTS.md e docs/ARCHITECTURE.md antes de explorar o código
            - Frontend: Next.js App Router em app/, actions em app/actions/, componentes do painel em app/painel/
            - Stack: TypeScript, Supabase, Tailwind, shadcn/ui

            Sua tarefa — execute EXATAMENTE nesta ordem:
            1. Leia AGENTS.md para entender o projeto
            2. Localize e diagnostique o bug
            3. Crie uma branch: git checkout -b fix/issue-${{ github.event.issue.number }}
            4. Implemente a correção mínima necessária nos arquivos
            5. Commit: git add -A && git commit -m "fix: ${{ github.event.issue.title }}"
            6. Push: git push origin fix/issue-${{ github.event.issue.number }}
            7. Crie o PR: gh pr create --title "fix: ${{ github.event.issue.title }}" --body "Closes #${{ github.event.issue.number }}" --base main

            Se o bug não for reproduzível ou a causa não for clara, comente na issue com gh issue comment ${{ github.event.issue.number }} --body "..." e não crie branch nem PR.
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(git checkout -b *)",
                  "Bash(git add *)",
                  "Bash(git commit *)",
                  "Bash(git push *)",
                  "Bash(git status)",
                  "Bash(git diff *)",
                  "Bash(git log *)",
                  "Bash(gh pr create *)",
                  "Bash(gh issue comment *)",
                  "Bash(ls *)",
                  "Bash(find *)",
                  "Bash(grep *)",
                  "Bash(cat *)",
                  "Bash(echo *)",
                  "Bash(node *)",
                  "Bash(npm *)",
                  "Bash(npx *)",
                  "Bash(python3 *)",
                  "Bash(sed *)",
                  "Bash(awk *)",
                  "Edit",
                  "Write",
                  "MultiEdit"
                ],
                "deny": []
              }
            }
          claude_args: '--max-turns 50'
